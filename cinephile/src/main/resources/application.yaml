spring:
  application:
    name: cinephile

  datasource:
    url: jdbc:h2:mem:screenings
    driver-class-name: org.h2.Driver
    username: sa
    password: ""

  h2:
    console:
      enabled: true

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

amc:
  api:
    key: ${AMC_API_KEY:}
    base-url: https://api.amctheatres.com