spring:
  application:
    name: cinephile

  datasource:
    url: jdbc:postgresql://localhost:5432/cinephile
    driver-class-name: org.postgresql.Driver
    username: postgres
    password: cinephile

  h2:
    console:
      enabled: false

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

amc:
  api:
    key: ${AMC_API_KEY:}
    base-url: https://api.amctheatres.com

tmdb:
  api:
    key: ${TMDB_API_KEY:}
    base-url: https://api.themoviedb.org/3
    image-base-url: https://image.tmdb.org/t/p/w500

omdb:
  api:
    key: ${OMDB_API_KEY:}
    base-url: https://www.omdbapi.com